<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — High Conscious Life</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 120px 32px 80px; }
    .admin-login { max-width: 380px; margin: 80px auto; text-align: center; }
    .admin-login h1 {
      font-family: 'Fraunces', serif; font-weight: 400; font-size: 30px;
      color: var(--ink); margin-bottom: 8px;
    }
    .admin-login p { font-size: 13px; color: var(--ink-muted); margin-bottom: 28px; }
    .admin-input {
      width: 100%; border: 1px solid rgba(44,44,44,0.15); background: var(--white);
      padding: 14px 16px; font-family: 'Inter', sans-serif; font-size: 15px;
      color: var(--ink); outline: none; margin-bottom: 12px;
    }
    .admin-input:focus { border-color: var(--gold); }
    .admin-error { font-size: 12px; color: #C0392B; min-height: 18px; margin-bottom: 10px; }
    .admin-header {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
    }
    .admin-header h1 { font-family: 'Fraunces', serif; font-weight: 400; font-size: 28px; color: var(--ink); }
    .admin-count { font-size: 13px; color: var(--ink-muted); }
    .table-scroll { overflow-x: auto; border: 1px solid rgba(44,44,44,0.1); }
    table { border-collapse: collapse; width: 100%; font-size: 13.5px; min-width: 760px; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid rgba(44,44,44,0.08); white-space: nowrap; }
    th {
      font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink-muted); background: var(--ivory-warm);
    }
    td { color: var(--ink-soft); }
    td.code { font-family: 'Fraunces', serif; color: var(--ink); letter-spacing: 0.04em; }
    tr:hover td { background: var(--ivory-warm); }
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .empty { padding: 40px; text-align: center; color: var(--ink-muted); font-size: 14px; }
    @media (max-width: 600px) { .admin-wrap { padding: 100px 16px 60px; } }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="/">High Conscious Life</a>
  </nav>

  <!-- LOGIN -->
  <div class="admin-login" id="login">
    <h1>Admin Access</h1>
    <p>Enter the admin password to view registrations.</p>
    <input class="admin-input" id="pwd" type="password" placeholder="Admin password" />
    <p class="admin-error" id="login-error"></p>
    <button class="btn-primary" style="width:100%" id="login-btn" onclick="login()">Sign In</button>
  </div>

  <!-- DASHBOARD -->
  <div class="admin-wrap" id="dash" style="display:none">
    <div class="admin-header">
      <h1>Registrations</h1>
      <span class="admin-count" id="count"></span>
    </div>
    <div class="toolbar">
      <button class="btn-outline" onclick="load()">Refresh</button>
      <button class="btn-outline" onclick="downloadCsv()">Download CSV</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Name</th><th>Reservation Code</th><th>Email</th>
            <th>Phone</th><th>Amount</th><th>Payment ID</th><th>Used</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">No registrations yet.</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://mewacoirynzkbvsqxlhh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_m-khzeZ6_Z3YeKL0JSkG5w_QslyGqeS';
    let PWD = '';
    let DATA = [];

    function esc(s) {
      return (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    }
    function fmtDate(s) {
      if (!s) return '—';
      try { return new Date(s).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' }); }
      catch (e) { return s; }
    }
    function fmtAmount(paise) {
      if (paise == null) return '—';
      return '₹' + (paise / 100).toLocaleString('en-IN');
    }

    async function fetchRows(password) {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-list`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({ password }),
      });
      if (res.status === 401) throw new Error('unauthorized');
      if (!res.ok) throw new Error('failed');
      const data = await res.json();
      return data.rows || [];
    }

    async function login() {
      const pwd = document.getElementById('pwd').value;
      const err = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');
      err.textContent = '';
      if (!pwd) { err.textContent = 'Please enter the password.'; return; }
      btn.disabled = true; btn.textContent = 'Checking…';
      try {
        DATA = await fetchRows(pwd);
        PWD = pwd;
        document.getElementById('login').style.display = 'none';
        document.getElementById('dash').style.display = 'block';
        render();
      } catch (e) {
        err.textContent = e.message === 'unauthorized' ? 'Wrong password.' : 'Could not connect. Try again.';
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function load() {
      try { DATA = await fetchRows(PWD); render(); } catch (e) { /* ignore */ }
    }

    function render() {
      const tbody = document.getElementById('rows');
      document.getElementById('count').textContent = DATA.length + ' total';
      document.getElementById('empty').style.display = DATA.length ? 'none' : 'block';
      tbody.innerHTML = DATA.map(r => `<tr>
        <td>${esc(fmtDate(r.created_at))}</td>
        <td>${esc(r.name || '—')}</td>
        <td class="code">${esc(r.code)}</td>
        <td>${esc(r.email || '—')}</td>
        <td>${esc(r.contact || '—')}</td>
        <td>${esc(fmtAmount(r.amount))}</td>
        <td>${esc(r.payment_id || '—')}</td>
        <td>${r.used ? 'Yes' : 'No'}</td>
      </tr>`).join('');
    }

    function downloadCsv() {
      const cols = ['created_at','name','code','email','contact','amount','payment_id','used'];
      const head = cols.join(',');
      const body = DATA.map(r => cols.map(c => {
        let v = r[c]; if (c === 'amount' && v != null) v = (v / 100);
        return '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"';
      }).join(',')).join('\n');
      const blob = new Blob([head + '\n' + body], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'registrations.csv';
      a.click();
    }

    document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
